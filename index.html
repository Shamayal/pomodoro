<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css" />
  <title>Pomodoro</title>
</head>
<body>
  <h1>Pomodoro Timer</h1> <!-- 25 minutes -->
  <h1>Short Break</h1> <!-- 5 minutes -->
  <h1>Long Break</h1> <!-- 15 minutes -->
  <div class="timer">
    25:00
  </div>
  <div id="control-btns">
    <button id="start-btn" onclick="startTimer()">Start</button>
    <button id="pause-btn" onclick="pauseTimer()">Pause</button>
    <button id="restart-btn" onclick="restartTimer()">Restart</button>
  </div>
  <script src="./script.js"></script>
  
</body>
</html>
